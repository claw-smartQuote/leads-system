<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI人工智能免費協助汽車保險到期提示及報價，香港人註冊國內中介人，專業辦理港車北上保險">
    <meta property="og:title" content="汽車保險 到期提示及報價">
    <meta property="og:description" content="AI人工智能免費汽車保險到期提示及報價服務，專業辦理港車北上保險">
    <meta property="og:url" content="https://leads-system.onrender.com">
    <meta property="og:type" content="website">
    <title>汽車保險 到期提示及報價</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #d69e2e;
            --accent-light: #ecc94b;
            --bg-light: #f7fafc;
            --text-dark: #1a202c;
            --text-muted: #718096;
            --success: #38a169;
            --border: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        
        .header {
            background: var(--primary);
            color: white;
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent);
        }
        
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .header p {
            font-size: 15px;
            opacity: 0.9;
        }
        
        .header .tagline {
            display: inline-block;
            background: var(--accent);
            color: var(--primary);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        label .required {
            color: #c53030;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: var(--bg-light);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
            background: white;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(26, 54, 93, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .benefits {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
        }
        
        .benefits h3 {
            color: var(--primary);
            font-size: 15px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .benefits ul {
            list-style: none;
            padding: 0;
        }
        
        .benefits li {
            padding: 6px 0;
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        
        .benefits li::before {
            content: '✓';
            color: var(--success);
            font-weight: bold;
            margin-right: 10px;
            font-size: 12px;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }
        
        .section-title h3 {
            color: var(--primary);
            font-size: 16px;
            font-weight: 600;
        }
        
        .section-title .icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
        }
        
        .success-message {
            display: none;
            background: #f0fff4;
            color: #22543d;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid #9ae6b4;
        }
        
        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .success-message h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .success-message p {
            font-size: 14px;
            color: #48bb78;
        }
        
        .footer {
            text-align: center;
            padding: 25px 20px;
            color: var(--text-muted);
            font-size: 12px;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="tagline">🚗 專業汽車保險顧問</span>
            <h1>汽車保險 到期提示及報價</h1>
            <p>AI 人工智能 免費協助 提示保單到期及報價</p>
        </div>
        
        <div class="form-container">
            <div class="benefits">
                <h3>💡 為什麼選擇 SmartQuote？</h3>
                <ul>
                    <li>免費AI人工智能協助提示保單到期</li>
                    <li>免費專業諮詢，無隱藏費用</li>
                    <li>比較多家保險公司報價</li>
                    <li>快速處理，即日回覆</li>
                    <li>專業辦理港車北上保險</li>
                </ul>
            </div>
            
            <form id="leadForm">
                <div class="section-title">
                    <div class="icon">👤</div>
                    <h3>您的資料</h3>
                </div>
                
                <div class="form-group">
                    <label>姓名 <span class="required">*</span></label>
                    <input type="text" name="name" required placeholder="請輸入您的姓名">
                </div>
                
                <div class="form-group">
                    <label>聯絡電話 / WhatsApp <span class="required">*</span></label>
                    <input type="tel" name="phone" required placeholder="例如: 91234567">
                </div>
                
                <div class="form-group">
                    <label>電郵地址 / 微信</label>
                    <input type="text" name="email" placeholder="例如: example@email.com 或 WeChatID">
                </div>
                
                <div class="section-title" style="margin-top: 30px;">
                    <div class="icon">🚙</div>
                    <h3>車輛資料</h3>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>車牌號碼</label>
                        <input type="text" name="car_plate" placeholder="例如: AB1234">
                    </div>
                    <div class="form-group">
                        <label>車輛年份</label>
                        <input type="text" name="car_year" placeholder="例如: 2020">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>車輛型號</label>
                    <input type="text" name="car_model" placeholder="例如: Toyota Camry">
                </div>
                
                <div class="form-group">
                    <label>現有保險公司</label>
                    <input type="text" name="current_insurer" placeholder="例如: AIG / 蘇黎世 / 立橋">
                </div>
                
                <div class="form-group">
                    <label>保單到期日</label>
                    <input type="date" name="expiry_date">
                </div>
                
                <div class="form-group">
                    <label>查詢類型 <span class="required">*</span></label>
                    <select name="inquiry_type" required>
                        <option value="">請選擇</option>
                        <option value="新保">新保（新車投保）</option>
                        <option value="續保">續保（現有保單續期）</option>
                        <option value="轉保">轉保（轉換保險公司）</option>
                        <option value="港車北上">🇨🇳 港車北上保險</option>
                        <option value="其他">其他查詢</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>保險種類</label>
                    <select name="insurance_type">
                        <option value="">請選擇</option>
                        <option value="全保">全保</option>
                        <option value="三保">三保</option>
                        <option value="交強險">交強險</option>
                        <option value="商業險(第三者責任)">商業險(第三者責任)</option>
                        <option value="駕意險">駕意險</option>
                        <option value="其他險種">其他險種</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>備註 / 特別要求</label>
                    <textarea name="notes" placeholder="請描述您的需求，例如：需要第三者保險、希望比較價格等..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">📋 提交查詢</button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在提交...</p>
            </div>
            
            <div class="success-message" id="successMessage">
                <h3>✅ 提交成功！</h3>
                <p>感謝您提交查詢，我們會儘快與您聯繫。</p>
                <p style="margin-top: 10px; font-size: 13px;">預計回覆時間：1-2 個工作天</p>
            </div>
        </div>
        
        <div class="footer">
            <p>您提供的資料將保密處理，僅適用於到期提示或報價用途</p>
            <p style="margin-top: 8px;">
                <a href="/terms">免責條款及私隱條款</a>
            </p>
            <p style="margin-top: 12px; color: var(--primary); font-weight: 500;">
                SmartQuote | 查詢：<a href="mailto:ai@smartquote.cn">ai@smartquote.cn</a>
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            
            // 顯示載入中
            form.style.display = 'none';
            loading.classList.add('show');
            
            // 收集表單數據
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/leads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    loading.classList.remove('show');
                    successMessage.classList.add('show');
                } else {
                    throw new Error('提交失敗');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('提交時發生錯誤，請稍後再試。');
                loading.classList.remove('show');
                form.style.display = 'block';
            }
        });
    </script>
</body>
</html>
